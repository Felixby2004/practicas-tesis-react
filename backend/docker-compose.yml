version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: unt_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: unt_university_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - unt_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unt_backend
    environment:
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/unt_university_db
      JWT_SECRET: your-super-secret-jwt-key-change-this
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000/login
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    networks:
      - unt_network
    command: sh -c "npx prisma migrate deploy && npm run start:dev"

volumes:
  postgres_data:

networks:
  unt_network:
    driver: bridge